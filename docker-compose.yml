services:
  app:
    build: .
    ports:
      - "4000:4000"
      # Uncomment to enable HTTPS directly in Phoenix (no reverse proxy needed).
      # Set SSL_CERTFILE and SSL_KEYFILE env vars below.
      # - "443:443"
    # Enable this to set custom env values
    #env_file:
    #  - .env
    environment:
      # Run mix phx.gen.secret
      SECRET_KEY_BASE: 1DdaMAX56nUh1tvXniEEuQNsGNvgADndawxrJ3YFZlLXc9EOahC/NFDgowCDUFwb
      # Path to server module plugins
      GAME_SERVER_PLUGINS_DIR: modules/plugins_examples
      DEVICE_AUTH_ENABLED: true
      PHX_HOST: localhost
      # Disable this in prod
      MAILBOX_PREVIEW_ENABLED: true
      # ── HTTPS (uncomment to enable) ──
      # SSL_CERTFILE: /etc/letsencrypt/live/${PHX_HOST:-localhost}/fullchain.pem
      # SSL_KEYFILE: /etc/letsencrypt/live/${PHX_HOST:-localhost}/privkey.pem
      # FORCE_SSL: "true"
      # ACME_WEBROOT: /var/www/acme
      # ── GeoIP (country lookup from IP) ──
      # Download GeoLite2-Country.mmdb from MaxMind (free account required):
      # https://dev.maxmind.com/geoip/geolite2-free-geolocation-data
      # Place it at ./apps/game_server_host/data/GeoLite2-Country.mmdb
      GEOIP_DB_PATH: /app/apps/game_server_host/data/GeoLite2-Country.mmdb
    volumes:
      - ./modules:/app/modules
      - ./apps/game_server_host/priv/static/images:/app/apps/game_server_host/priv/static/images
      - ./apps/game_server_host/priv/static/theme.css:/app/apps/game_server_host/priv/static/theme.css
      - ./apps/game_server_host/db:/app/apps/game_server_host/db
      - ./apps/game_server_host/data:/app/apps/game_server_host/data:ro
      # Uncomment for HTTPS — mount Let's Encrypt certs and ACME webroot
      # - ./certbot/conf:/etc/letsencrypt:ro
      # - ./certbot/www:/var/www/acme:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Observability (Prometheus + Grafana) ──
  # Prometheus scrapes /metrics from the app every 15s.
  # Grafana auto-provisions Prometheus as a data source.
  # Access Grafana at http://localhost:3000 (admin/admin).
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
